<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Optimizer App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        #map { height: 100%; width: 100%; z-index: 1; }
        .compact-input { padding: 4px 6px; font-size: 11px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; line-height: 1.2; }
        .compact-input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12); }
    </style>
</head>
<body class="bg-slate-100 h-screen flex overflow-hidden text-slate-800">

    <div class="w-[460px] max-w-full bg-white shadow-xl flex flex-col z-10 border-r border-slate-300">
        <div class="p-4 bg-slate-900 text-white border-b border-slate-700">
            <div class="flex justify-between items-start gap-3">
                <div>
                    <h1 class="font-bold tracking-tight text-lg">Route Optimizer</h1>
                    <p class="text-xs text-slate-300 mt-1">Import points, place waypoints directly on the map, then review the optimized route from the summary drawer.</p>
                </div>
                <div class="flex gap-2 shrink-0">
                    <button id="btnAddMode" class="bg-blue-600 hover:bg-blue-500 px-3 py-2 rounded-lg text-xs font-bold transition">Add Waypoint</button>
                    <input type="file" id="fileInput" class="hidden" accept=".csv,text/csv">
                    <button onclick="document.getElementById('fileInput').click()" class="bg-slate-700 hover:bg-slate-600 px-3 py-2 rounded-lg text-xs font-bold transition">Import</button>
                </div>
            </div>
        </div>

        <div id="pointContainer" class="flex-1 overflow-y-auto p-2 space-y-1 bg-slate-50"></div>

        <div class="p-4 bg-white border-t border-slate-200 space-y-2">
            <button id="btnOptimize" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 rounded-xl shadow transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                Run Optimization
            </button>
        </div>
    </div>

    <div class="flex-1 relative h-full overflow-hidden">
        <div id="map"></div>

        <div id="placementHint" class="absolute top-4 left-1/2 -translate-x-1/2 z-[1000] hidden">
            <div class="bg-slate-900 text-white px-4 py-2 rounded-full shadow-xl text-sm font-medium">
                Click anywhere on the map to place the next waypoint.
            </div>
        </div>

        <div id="cursorVertical" class="absolute inset-y-0 w-px bg-blue-500/60 pointer-events-none z-[999] hidden"></div>
        <div id="cursorHorizontal" class="absolute inset-x-0 h-px bg-blue-500/60 pointer-events-none z-[999] hidden"></div>

        <button id="panelToggle" class="absolute top-4 right-4 z-[1002] hidden bg-white/95 backdrop-blur px-4 py-2 rounded-full shadow-lg border border-slate-200 text-sm font-semibold text-slate-700 hover:text-blue-700">
            Show Summary
        </button>

        <aside id="resultPanel" class="absolute top-16 right-4 z-[1001] hidden w-[320px] max-w-[calc(100%-2rem)] bg-white/95 backdrop-blur rounded-2xl border border-slate-200 shadow-2xl overflow-hidden">
            <div class="px-4 py-3 border-b border-slate-200 bg-slate-900 text-white flex items-start justify-between gap-3">
                <div>
                    <h2 class="text-sm font-bold tracking-wide uppercase">Route Summary</h2>
                    <p class="text-xs text-slate-300 mt-1">Latest optimization result</p>
                </div>
                <button id="btnHidePanel" class="text-xs text-slate-300 hover:text-white">Hide</button>
            </div>

            <div class="p-4 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="rounded-xl bg-blue-50 border border-blue-100 p-3">
                        <p class="text-[11px] uppercase tracking-wide text-slate-500">Distance</p>
                        <p id="resDist" class="font-bold text-blue-700 text-lg">-</p>
                    </div>
                    <div class="rounded-xl bg-blue-50 border border-blue-100 p-3">
                        <p class="text-[11px] uppercase tracking-wide text-slate-500">Time</p>
                        <p id="resTime" class="font-bold text-blue-700 text-lg">-</p>
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-xs font-bold uppercase tracking-wide text-slate-500">Visit Order</h3>
                        <span id="resCount" class="text-xs text-slate-400">0 waypoints</span>
                    </div>
                    <div id="resultStops" class="max-h-[320px] overflow-y-auto space-y-2"></div>
                </div>
            </div>
        </aside>

    </div>

    <script>
        const map = L.map('map').setView([49.8951, -97.1384], 12);

        let points = [];
        let markers = [];
        let optimizedRoute = [];
        let routeLine = null;
        let isPlacementMode = false;
        let nextPointKey = 1;
        let hasSummary = false;

        const addModeBtn = document.getElementById('btnAddMode');
        const pointContainer = document.getElementById('pointContainer');
        const optimizeBtn = document.getElementById('btnOptimize');
        const placementHint = document.getElementById('placementHint');
        const resultPanel = document.getElementById('resultPanel');
        const panelToggle = document.getElementById('panelToggle');
        const cursorVertical = document.getElementById('cursorVertical');
        const cursorHorizontal = document.getElementById('cursorHorizontal');

        const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        });
        const lightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            subdomains: 'abcd',
            maxZoom: 20,
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        });
        const topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            maxZoom: 17,
            attribution: 'Map data: &copy; OpenStreetMap contributors, SRTM | Map style: &copy; OpenTopoMap'
        });
        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        });

        streetLayer.addTo(map);
        L.control.layers(
            {
                Streets: streetLayer,
                Light: lightLayer,
                Topographic: topoLayer,
                Satellite: satelliteLayer
            },
            {},
            { position: 'bottomright', collapsed: true }
        ).addTo(map);

        function roundCoord(value) {
            return parseFloat(Number(value).toFixed(6));
        }

        function sanitizeHeader(header) {
            return String(header || '')
                .replace(/^\uFEFF/, '')
                .trim()
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '');
        }

        function getRowValue(row, matcher) {
            for (const [key, value] of Object.entries(row)) {
                if (matcher(sanitizeHeader(key), value)) {
                    return value;
                }
            }
            return undefined;
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function focusMapOnPoints(targetPoints = points) {
            if (!targetPoints.length) {
                return;
            }

            const latLngs = targetPoints.map((point) => [point.lat, point.lng]);
            if (latLngs.length === 1) {
                map.flyTo(latLngs[0], Math.max(map.getZoom(), 14), { duration: 0.6 });
                return;
            }

            map.fitBounds(latLngs, { padding: [48, 48] });
        }

        function setResultPanelVisible(visible) {
            resultPanel.classList.toggle('hidden', !visible);
            panelToggle.classList.toggle('hidden', visible || !hasSummary);
        }

        function clearRouteLine() {
            if (routeLine) {
                map.removeLayer(routeLine);
                routeLine = null;
            }
        }

        function clearOptimizationState() {
            optimizedRoute = [];
            hasSummary = false;
            points.forEach((point) => {
                point.rank = null;
            });
            clearRouteLine();
            resultPanel.classList.add('hidden');
            panelToggle.classList.add('hidden');
            document.getElementById('resDist').innerText = '-';
            document.getElementById('resTime').innerText = '-';
            document.getElementById('resCount').innerText = '0 waypoints';
            document.getElementById('resultStops').innerHTML = '';
        }

        function drawOptimizedRoute(routePoints) {
            clearRouteLine();
            if (routePoints.length < 2) {
                return;
            }

            routeLine = L.polyline(
                routePoints.map((point) => [point.lat, point.lng]),
                {
                    color: '#2563eb',
                    weight: 4,
                    opacity: 0.85,
                    dashArray: '10 8'
                }
            ).addTo(map);
        }

        function setPlacementMode(active) {
            isPlacementMode = active;
            placementHint.classList.toggle('hidden', !active);
            addModeBtn.textContent = active ? 'Cancel Waypoint' : 'Add Waypoint';
            addModeBtn.classList.toggle('bg-blue-600', !active);
            addModeBtn.classList.toggle('hover:bg-blue-500', !active);
            addModeBtn.classList.toggle('bg-emerald-600', active);
            addModeBtn.classList.toggle('hover:bg-emerald-500', active);
            map.getContainer().style.cursor = active ? 'crosshair' : '';
            if (active) {
                cursorVertical.style.left = '50%';
                cursorHorizontal.style.top = '50%';
            }
            cursorVertical.classList.toggle('hidden', !active);
            cursorHorizontal.classList.toggle('hidden', !active);
        }

        function updateResultPanel(metrics, routePoints) {
            document.getElementById('resDist').innerText = metrics.distance_km + ' km';
            document.getElementById('resTime').innerText = metrics.duration_minutes + ' min';
            document.getElementById('resCount').innerText = routePoints.length + ' waypoints';
            document.getElementById('resultStops').innerHTML = routePoints.map((point, index) => `
                <div class="flex items-start gap-3 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2">
                    <div class="w-7 h-7 rounded-full bg-blue-600 text-white text-xs font-bold flex items-center justify-center shrink-0">${index + 1}</div>
                    <div class="min-w-0">
                        <p class="text-sm font-semibold text-slate-800 break-words">${escapeHtml(point.id)}</p>
                        <p class="text-[11px] text-slate-500 font-mono">${point.lat.toFixed(6)}, ${point.lng.toFixed(6)}</p>
                    </div>
                </div>
            `).join('');

            hasSummary = true;
            setResultPanelVisible(true);
        }

        function createPoint(lat, lng, name = null, fallbackIndex = points.length + 1) {
            const label = name && String(name).trim() ? String(name).trim() : `Waypoint ${fallbackIndex}`;
            return {
                id: label,
                routeKey: `point-${nextPointKey++}`,
                lat: roundCoord(lat),
                lng: roundCoord(lng),
                rank: null
            };
        }

        function addPoint(lat, lng, name = null, options = {}) {
            const latNumber = Number(lat);
            const lngNumber = Number(lng);
            if (!Number.isFinite(latNumber) || !Number.isFinite(lngNumber)) {
                return false;
            }

            if (!options.preserveOptimization) {
                clearOptimizationState();
            }

            points.push(createPoint(latNumber, lngNumber, name));
            renderUI();

            if (options.focus) {
                focusMapOnPoints([points[points.length - 1]]);
            }

            return true;
        }

        function extractCoordinate(value) {
            if (typeof value === 'number') {
                return Number.isFinite(value) ? value : null;
            }

            const text = String(value ?? '').trim();
            if (!text) {
                return null;
            }

            const direct = Number(text);
            if (Number.isFinite(direct)) {
                return direct;
            }

            const cleaned = text
                .replace(/\s+/g, '')
                .replace(/,/g, '')
                .replace(/º/g, '°');

            const match = cleaned.match(/^(-?\d+(?:\.\d+)?)°?([NSEW])?$/i);
            if (!match) {
                return null;
            }

            let numeric = Number(match[1]);
            if (!Number.isFinite(numeric)) {
                return null;
            }

            const direction = (match[2] || '').toUpperCase();
            if (direction === 'S' || direction === 'W') {
                numeric *= -1;
            }

            return numeric;
        }

        function normalizeRow(row) {
            const lat = getRowValue(row, (key) => key === 'lat' || key === 'latitude' || key === 'y' || key.includes('lat'));
            const lng = getRowValue(row, (key) => key === 'lng' || key === 'lon' || key === 'long' || key === 'longitude' || key === 'x' || key.includes('lon') || key.includes('lng') || key.includes('long'));
            const name = getRowValue(row, (key) => key === 'name' || key === 'id' || key === 'customer' || key === 'label' || key.includes('name'));

            let latNumber = extractCoordinate(lat);
            let lngNumber = extractCoordinate(lng);

            if (!Number.isFinite(latNumber) || !Number.isFinite(lngNumber)) {
                const numericValues = Object.values(row)
                    .map(extractCoordinate)
                    .filter((value) => Number.isFinite(value));

                for (let index = 0; index < numericValues.length - 1; index += 1) {
                    const possibleLat = numericValues[index];
                    const possibleLng = numericValues[index + 1];
                    if (Math.abs(possibleLat) <= 90 && Math.abs(possibleLng) <= 180) {
                        latNumber = possibleLat;
                        lngNumber = possibleLng;
                        break;
                    }
                }
            }

            if (!Number.isFinite(latNumber) || !Number.isFinite(lngNumber)) {
                return null;
            }

            return {
                lat: latNumber,
                lng: lngNumber,
                name
            };
        }

        function renderEmptyState() {
            pointContainer.innerHTML = `
                <div class="rounded-2xl border border-dashed border-slate-300 bg-white px-5 py-8 text-center shadow-sm">
                    <p class="text-sm font-semibold text-slate-700">No waypoints yet</p>
                    <p class="text-xs text-slate-500 mt-2">Import a CSV or click <span class="font-semibold text-slate-700">Add Waypoint</span> and place points directly on the map.</p>
                </div>
            `;
        }

        function renderUI() {
            optimizeBtn.disabled = points.length < 2;
            pointContainer.innerHTML = '';

            markers.forEach((marker) => map.removeLayer(marker));
            markers = [];

            if (!points.length) {
                renderEmptyState();
                return;
            }

            points.forEach((point, index) => {
                const row = document.createElement('div');
                row.className = 'bg-white border border-slate-200 rounded-md px-2 py-1 shadow-sm hover:border-blue-200 hover:bg-blue-50/40 transition-colors';

                const statusLabel = point.rank ? `Stop #${point.rank}` : (index === 0 ? 'Start' : 'Pending');
                const statusClasses = point.rank
                    ? 'bg-blue-100 text-blue-700 border-blue-200'
                    : (index === 0 ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-slate-100 text-slate-500 border-slate-200');

                row.innerHTML = `
                    <div class="flex items-center gap-2">
                        <div class="flex flex-col gap-0.5">
                            <button onclick="movePoint(${index}, -1)" class="text-[9px] text-slate-400 hover:text-blue-600 leading-none">UP</button>
                            <button onclick="movePoint(${index}, 1)" class="text-[9px] text-slate-400 hover:text-blue-600 leading-none">DN</button>
                        </div>
                        <div class="flex-1 min-w-0 flex items-center gap-1.5 flex-wrap">
                            <input type="text" value="${escapeHtml(point.id)}" onchange="updatePoint(${index}, 'id', this.value)" class="compact-input flex-[1_1_120px] min-w-[110px] font-semibold" placeholder="Waypoint name">
                            <input type="text" value="${point.lat}" onchange="updatePoint(${index}, 'lat', this.value)" class="compact-input w-[96px] font-mono" aria-label="Latitude">
                            <input type="text" value="${point.lng}" onchange="updatePoint(${index}, 'lng', this.value)" class="compact-input w-[96px] font-mono" aria-label="Longitude">
                            <span class="text-[10px] font-bold px-2 py-1 rounded-full border whitespace-nowrap ${statusClasses}">${statusLabel}</span>
                        </div>
                        <div class="shrink-0">
                            <button onclick="deletePoint(${index})" class="text-[10px] text-slate-400 hover:text-red-600">Remove</button>
                        </div>
                    </div>
                `;
                pointContainer.appendChild(row);

                const marker = L.marker([point.lat, point.lng], { draggable: true }).addTo(map);
                marker.bindPopup(`<b>${escapeHtml(point.id)}</b><br>${point.lat.toFixed(6)}, ${point.lng.toFixed(6)}`);
                marker.on('dragend', (event) => {
                    clearOptimizationState();
                    const position = event.target.getLatLng();
                    points[index].lat = roundCoord(position.lat);
                    points[index].lng = roundCoord(position.lng);
                    renderUI();
                });
                markers.push(marker);
            });
        }

        panelToggle.addEventListener('click', () => {
            if (!hasSummary) {
                return;
            }
            setResultPanelVisible(true);
        });

        document.getElementById('btnHidePanel').addEventListener('click', () => {
            setResultPanelVisible(false);
        });

        addModeBtn.addEventListener('click', () => {
            setPlacementMode(!isPlacementMode);
        });

        map.on('mousemove', (event) => {
            if (!isPlacementMode) {
                return;
            }
            cursorVertical.style.left = `${event.containerPoint.x}px`;
            cursorHorizontal.style.top = `${event.containerPoint.y}px`;
        });

        map.on('click', (event) => {
            if (!isPlacementMode) {
                return;
            }

            addPoint(event.latlng.lat, event.latlng.lng);
            setPlacementMode(false);
        });

        window.updatePoint = (index, field, value) => {
            if (!points[index]) {
                return;
            }

            clearOptimizationState();

            if (field === 'id') {
                points[index].id = String(value).trim() || `Waypoint ${index + 1}`;
                renderUI();
                return;
            }

            const parsed = Number(value);
            if (!Number.isFinite(parsed)) {
                renderUI();
                return;
            }

            points[index][field] = roundCoord(parsed);
            renderUI();
        };

        window.deletePoint = (index) => {
            points.splice(index, 1);
            clearOptimizationState();
            renderUI();
        };

        window.movePoint = (index, direction) => {
            const nextIndex = index + direction;
            if (nextIndex < 0 || nextIndex >= points.length) {
                return;
            }

            clearOptimizationState();
            [points[index], points[nextIndex]] = [points[nextIndex], points[index]];
            renderUI();
        };

        optimizeBtn.addEventListener('click', async function() {
            this.disabled = true;
            this.innerText = 'Processing...';

            try {
                const response = await fetch('/api/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        locations: points.map((point) => ({
                            id: point.routeKey,
                            lat: point.lat,
                            lng: point.lng
                        }))
                    })
                });
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Optimization failed.');
                }

                if (data.status === 'success') {
                    optimizedRoute = data.optimized_route.map((routePoint) => {
                        const localPoint = points.find((point) => point.routeKey === routePoint.id);
                        return {
                            id: localPoint ? localPoint.id : routePoint.id,
                            routeKey: routePoint.id,
                            lat: routePoint.lat,
                            lng: routePoint.lng
                        };
                    });
                    points.forEach((point) => {
                        const rank = optimizedRoute.findIndex((routePoint) => routePoint.routeKey === point.routeKey);
                        point.rank = rank >= 0 ? rank + 1 : null;
                    });

                    drawOptimizedRoute(optimizedRoute);
                    updateResultPanel(data.metrics, optimizedRoute);
                    renderUI();
                    focusMapOnPoints(optimizedRoute);
                }
            } catch (error) {
                alert(error.message || 'Optimization failed.');
            } finally {
                this.disabled = points.length < 2;
                this.innerText = 'Run Optimization';
            }
        });

        document.getElementById('fileInput').addEventListener('change', (event) => {
            const [file] = event.target.files || [];
            if (!file) {
                return;
            }

            Papa.parse(file, {
                header: true,
                dynamicTyping: true,
                skipEmptyLines: 'greedy',
                transformHeader: (header) => sanitizeHeader(header),
                complete: (results) => {
                    const importedRows = results.data
                        .map(normalizeRow)
                        .filter(Boolean);

                    if (!importedRows.length) {
                        alert('No valid latitude/longitude rows were found in that file.');
                        event.target.value = '';
                        return;
                    }

                    clearOptimizationState();
                    const importedPoints = [];
                    importedRows.forEach((row) => {
                        const point = createPoint(row.lat, row.lng, row.name, points.length + 1);
                        points.push(point);
                        importedPoints.push(point);
                    });
                    renderUI();
                    focusMapOnPoints(importedPoints);
                    event.target.value = '';
                },
                error: () => {
                    alert('The file could not be read.');
                    event.target.value = '';
                }
            });
        });

        renderUI();
    </script>
</body>
</html>
